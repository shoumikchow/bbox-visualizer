name: Type Check

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync project
        run: uv sync --extra dev

      - name: Run ty
        run: uv run ty check
